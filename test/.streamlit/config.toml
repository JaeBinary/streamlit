# ──────────────────────────────────────────────────────────
# Streamlit config.toml — Theme 전체 옵션
# 공식 문서: https://docs.streamlit.io/develop/api-reference/configuration/config.toml
# 주석 처리된 항목은 기본값으로 동작합니다. 필요한 항목만 주석 해제하여 사용하세요.
# ──────────────────────────────────────────────────────────

[runner]
# 상호작용 시 진행 중인 스크립트를 즉시 끊는 기능(기본 True). 켜져 있으면 폼이
# submit 버튼까지 그려지기 전 프레임이 노출되어 "Missing Submit Button" 경고가
# 순간적으로 깜빡인다. 끄면 각 rerun이 끝까지 그려진 뒤 다음 rerun이 시작된다.
fastReruns = false


[theme]

# ── 기본 테마 ────────────────────────────────────────────
# 상속할 기본 테마. "light" | "dark" | TOML 파일 경로 | URL
base = "light"

# ── 주요 색상 ─────────────────────────────────────────────
# 버튼, 슬라이더, 체크박스 등 강조 요소에 사용되는 색상
primaryColor = "#001685"

# 앱 전체 배경색
#backgroundColor = "#000000"

# 위젯(입력창, 사이드바 등) 배경색
#secondaryBackgroundColor = "#001685"

# 대부분의 텍스트에 사용되는 색상
# textColor = "#1A1A2E"

# ── 폰트 ────────────────────────────────────────────────
# 일반 텍스트 폰트. "sans serif" | "serif" | "monospace" | URL
font = "serif"

# 제목(h1~h6)에 사용할 폰트. font와 동일한 값 사용 가능
# headingFont = "serif"

# 코드 블록에 사용할 폰트. 기본값: "monospace"
# codeFont = "monospace"

# 루트 폰트 크기 (px). 기본값: 16
# baseFontSize = 16

# 루트 폰트 굵기 (100~600). 기본값: 400
# baseFontWeight = 400

# h1~h6 제목 크기 배열 (rem 또는 px)
# headingFontSizes = ["2.25rem", "1.75rem", "1.375rem", "1.125rem", "1rem", "0.875rem"]

# h1~h6 제목 굵기 배열
# headingFontWeights = [700, 700, 700, 600, 600, 600]

# 코드 블록 폰트 크기. 기본값: "0.875rem"
# codeFontSize = "0.875rem"

# 코드 블록 폰트 굵기. 기본값: 400
# codeFontWeight = 400

# ── 모서리(Radius) ────────────────────────────────────────
# 대부분의 UI 요소 모서리 반경 기준값. 예: "0px", "4px", "0.5rem"
# baseRadius = "0.5rem"

# 버튼 모서리 반경 (baseRadius 값 무시하고 별도 지정)
# buttonRadius = "0.5rem"

# ── 테두리(Border) ────────────────────────────────────────
# 요소 주변 테두리 색상
# borderColor = "#E0E0E0"

# 입력 위젯(text_input 등) 테두리 표시 여부
# showWidgetBorder = true

# 사이드바와 메인 콘텐츠 사이 구분선 표시 여부
# showSidebarBorder = true

# ── 링크 & 코드 색상 ──────────────────────────────────────
# 링크 텍스트 색상
# linkColor = "#4A90D9"

# 링크 밑줄 표시 여부
# linkUnderline = true

# 코드 블록 텍스트 색상
# codeTextColor = "#D63384"

# 코드 블록 배경색
# codeBackgroundColor = "#F8F9FA"

# ── 기본 색상 팔레트 ──────────────────────────────────────
# 상태 표시(st.success, st.error 등) 및 배지 등에 사용
# redColor              = "#FF4B4B"
# redBackgroundColor    = "#FFF0F0"
# redTextColor          = "#FF4B4B"

# orangeColor           = "#FF8700"
# orangeBackgroundColor = "#FFF3E0"
# orangeTextColor       = "#FF8700"

# yellowColor           = "#FFD16A"
# yellowBackgroundColor = "#FFFBEA"
# yellowTextColor       = "#916B00"

# blueColor             = "#4A90D9"
# blueBackgroundColor   = "#E8F1FB"
# blueTextColor         = "#4A90D9"

# greenColor            = "#21C354"
# greenBackgroundColor  = "#E6F9EC"
# greenTextColor        = "#21C354"

# violetColor           = "#803DF5"
# violetBackgroundColor = "#F1EAFF"
# violetTextColor       = "#803DF5"

# grayColor             = "#A3A8B4"
# grayBackgroundColor   = "#F0F2F6"
# grayTextColor         = "#6C757D"

# ── 데이터프레임 색상 ─────────────────────────────────────
# st.dataframe / st.data_editor 테두리 색상
# dataframeBorderColor = "#E0E0E0"

# 데이터프레임 헤더 배경색
# dataframeHeaderBackgroundColor = "#F0F2F6"

# ── 차트 색상 ─────────────────────────────────────────────
# 범주형 차트 데이터용 색상 배열 (st.bar_chart, st.line_chart 등)
# chartCategoricalColors = ["#4A90D9", "#FF8700", "#21C354", "#FF4B4B", "#803DF5", "#FFD16A", "#A3A8B4"]

# 연속형 데이터용 10색 그래디언트 (작은 값 → 큰 값)
# chartSequentialColors = ["#E8F1FB", "#C5D9F5", "#A2C1EF", "#7FA9E9", "#5C91E3", "#4A77D9", "#3A5EAD", "#2A4681", "#1A2E55", "#0A1629"]

# 발산형 데이터용 10색 스케일 (음수 ↔ 양수)
# chartDivergingColors = ["#FF4B4B", "#FF7F7F", "#FFB2B2", "#FFD9D9", "#FFFFFF", "#D9E8FB", "#A2C1EF", "#5C91E3", "#2A4681", "#0A1629"]


# ──────────────────────────────────────────────────────────
# 커스텀 폰트 파일 등록 (배열 형식, 여러 개 등록 가능)
# url: Google Fonts URL 또는 로컬 파일 경로 (static/fonts/MyFont.ttf)
# weight: 400 (regular) | 700 (bold)
# style: "normal" | "italic"
# ──────────────────────────────────────────────────────────
# [[theme.fontFaces]]
# family = "MyFont"
# url    = "static/fonts/MyFont.ttf"
# weight = 400
# style  = "normal"

# [[theme.fontFaces]]
# family = "MyFont"
# url    = "static/fonts/MyFont-Bold.ttf"
# weight = 700
# style  = "normal"


# ──────────────────────────────────────────────────────────
# 사이드바 전용 테마 — 메인 테마와 독립적으로 설정 가능
# 지원 옵션: 색상, 폰트, 테두리 등 (base, fontFaces 제외)
# ──────────────────────────────────────────────────────────
# textColor을 명시하지 않으면 사이드바 textColor가 빈 값("")으로 파생되어
# 프런트엔드 콘솔 에러("Invalid color passed for textColor in theme.sidebar")가
# rerun마다 발생한다. 라이트 테마 기본 글자색으로 명시해 이를 막는다.
[theme.sidebar]
textColor = "#1A1A2E"
# backgroundColor           = "#1A1A2E"
# secondaryBackgroundColor  = "#2A2A4E"
# primaryColor              = "#4A90D9"


# ──────────────────────────────────────────────────────────
# 라이트 모드 전용 테마 (base = "light" 일 때 적용)
# ──────────────────────────────────────────────────────────
# [theme.light]
# primaryColor             = "#4A90D9"
# backgroundColor          = "#FFFFFF"
# secondaryBackgroundColor = "#F0F4F8"
# textColor                = "#1A1A2E"

# [theme.light.sidebar]
# backgroundColor          = "#F0F4F8"


# ──────────────────────────────────────────────────────────
# 다크 모드 전용 테마 (base = "dark" 일 때 적용)
# ──────────────────────────────────────────────────────────
# [theme.dark]
# primaryColor             = "#4a77d9"
# backgroundColor          = "#000000"
# secondaryBackgroundColor = "#447fb9"
# textColor                = "#FFFFFF"

# [theme.dark.sidebar]
# backgroundColor          = "#0D0D1A"
